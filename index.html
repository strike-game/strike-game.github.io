<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Strike Through</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="top">
      <div class="panel" id="levelInfo">Level 1</div>
      <div class="panel" id="progress">Visited 0/0</div>
      <div class="panel" id="timer">Time: 00:00</div>
      <div class="panel" id="moves">Moves: 0</div>
      <button id="undoBtn">Undo</button>
      <button id="restartBtn">Restart</button>
    </div>

    <div id="game" aria-label="Puzzle board">
      <svg>
        <polyline id="line" />
      </svg>
      <div id="msg">
        <div id="msgText"></div>
        <button id="nextButton">Restart</button>
      </div>
    </div>

    <script src="game.js"></script>
  </body>
</html>
